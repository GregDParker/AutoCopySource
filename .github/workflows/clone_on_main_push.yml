name: Clone On Main Push

run-name: ${{ github.workflow }} run by ${{ github.actor }}

on:
  push:
    branches:
      - main

jobs:
  copy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          repository: GregDParker/AutoCopySource
          path: source

      - name: Checkout Destination
        uses: actions/checkout@v7
        with:
          repository: GregDParker/AutoCopyDestination
          path: destination
          token: ${{ secrets.DESTINATION_PAT }}

      - name: Copy files from source to destination
        run: |
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            source/ destination/

      - name: Delete files listed in .delete_on_copy
        run: |
          cd destination

          if [ -f .delete_on_copy ]; then
            while IFS= read -r file || [ -n "$file" ]; do
              rm -r -- "$file" || rm -r -- "${file%$'\r'}"
            done < .delete_on_copy
            rm -f .delete_on_copy
          fi

          cd ..

      - name: Commit and push changes
        run: |
          cd destination

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Sync files from source ${GITHUB_REF_NAME}"
          git push origin HEAD:main
